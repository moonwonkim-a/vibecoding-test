spring:
  datasource:
    url: jdbc:mariadb://192.100.50.100:33307/test?useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8
    username: "test_user"
    password: "test_user#1234"
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      connection-init-sql: "SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci"
  sql:
    init:
      mode: always
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MariaDBDialect
    show-sql: true
    properties:
      "[hibernate.format_sql]": true
      "[hibernate.connection.CharSet]": utf8mb4
      "[hibernate.connection.characterEncoding]": utf8mb4
      "[hibernate.connection.useUnicode]": true

server:
  servlet:
    session:
      timeout: 30m

logging:
  level:
    "[org.hibernate.SQL]": debug
